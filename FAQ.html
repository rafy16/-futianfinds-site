<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FAQ — FutianFinds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* FAQ Layout */
  .faq-main { background: #fff; padding: 110px 0; }
  @media (max-width: 800px) { .faq-main { padding: 72px 0; } }
  .faq-layout {
    display: grid; grid-template-columns: 240px 1fr;
    gap: 60px;
    align-items: start;
  }
  @media (max-width: 900px) { .faq-layout { grid-template-columns: 1fr; gap: 32px; } }

  /* Category sidebar */
  .cat-nav {
    position: sticky;
    top: 100px;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  @media (max-width: 900px) { .cat-nav { position: static; flex-direction: row; overflow-x: auto; padding-bottom: 8px; gap: 8px; } }
  .cat-nav button {
    text-align: left;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    transition: all .15s;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    white-space: nowrap;
  }
  .cat-nav button:hover { color: var(--navy); background: var(--cream); }
  .cat-nav button.active { color: var(--navy); background: var(--cream); border-color: var(--orange); }
  .cat-nav button .count {
    font-size: 12px;
    background: rgba(27,43,58,0.08);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 600;
  }
  .cat-nav button.active .count { background: var(--orange); color: #fff; }

  /* Search */
  .faq-search {
    position: relative;
    margin-bottom: 32px;
  }
  .faq-search input {
    width: 100%;
    padding: 16px 20px 16px 50px;
    background: var(--cream);
    border: 1.5px solid var(--line-dark);
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    transition: border-color .15s;
  }
  .faq-search input:focus {
    outline: none;
    border-color: var(--orange);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(232,133,59,0.12);
  }
  .faq-search .ic {
    position: absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* Accordion */
  .acc-group { margin-bottom: 40px; }
  .acc-group:last-child { margin-bottom: 0; }
  .acc-group-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--orange);
    margin: 0 0 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .acc-group-title::after {
    content: ""; flex: 1; height: 1px; background: var(--line-dark);
  }
  .acc-item {
    border: 1px solid var(--line-dark);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 10px;
    transition: all .15s;
    background: #fff;
  }
  .acc-item.open {
    border-color: rgba(232,133,59,0.4);
    box-shadow: 0 10px 30px -20px rgba(27,43,58,0.2);
  }
  .acc-q {
    width: 100%;
    padding: 22px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    text-align: left;
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    transition: background .15s;
  }
  .acc-q:hover { background: rgba(232,133,59,0.04); }
  .acc-q .toggle {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }
  .acc-item.open .toggle {
    background: var(--orange); color: #fff;
    transform: rotate(45deg);
  }
  .acc-a {
    padding: 0 24px 24px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.65;
  }
  .acc-a p { margin: 0 0 12px; }
  .acc-a p:last-child { margin-bottom: 0; }
  .acc-a strong { color: var(--ink); font-weight: 600; }
  .acc-a a { color: var(--orange); font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state strong { color: var(--navy); display: block; font-size: 18px; margin-bottom: 8px; }

  /* Still have questions CTA */
  .still-qs {
    background: var(--cream);
    padding: 80px 0;
  }
  .still-card {
    background: var(--navy);
    color: #fff;
    border-radius: 20px;
    padding: 56px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 600px) { .still-card { padding: 40px 28px; } }
  .still-card::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(500px 280px at 50% 100%, rgba(232,133,59,0.18), transparent 70%);
    pointer-events: none;
  }
  .still-card-inner { position: relative; z-index: 1; }
  .still-card h2 {
    font-size: clamp(28px, 3.4vw, 36px); font-weight: 800;
    margin: 16px 0 14px;
    letter-spacing: -0.02em;
  }
  .still-card p {
    color: rgba(255,255,255,0.65);
    font-size: 16px; line-height: 1.55;
    max-width: 500px; margin: 0 auto 28px;
  }
  .still-card-ctas { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="faq.jsx"></script>
</body>
</html>
