<title>FutianFinds — Source It · See It · Ship It</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1B2B3A;
    --navy-2: #243a4e;
    --orange: #E8853B;
    --orange-hover: #C96D2A;
    --cream: #F5F0EB;
    --cream-2: #efe7df;
    --ink: #2C2C2C;
    --muted: #6B7B8D;
    --green: #1D9E75;
    --line: rgba(255,255,255,0.10);
    --line-dark: rgba(27,43,58,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'ss01' on, 'cv11' on;
  }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  a { color: inherit; text-decoration: none; }
  .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 26px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.01em;
    border-radius: 8px;
    transition: all .18s ease;
    line-height: 1;
    white-space: nowrap;
  }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-primary:hover { background: var(--orange-hover); transform: translateY(-1px); box-shadow: 0 10px 24px -10px rgba(232,133,59,0.6); }
  .btn-outline-light { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.35); }
  .btn-outline-light:hover { border-color: #fff; background: rgba(255,255,255,0.06); }
  .btn-outline-dark { background: transparent; color: var(--navy); border: 1.5px solid rgba(27,43,58,0.2); }
  .btn-outline-dark:hover { border-color: var(--navy); background: rgba(27,43,58,0.04); }
  .btn-sm { padding: 11px 18px; font-size: 14px; }

  /* Section spacing */
  .section { padding: 96px 0; position: relative; }
  .section-sm { padding: 64px 0; }
  @media (max-width: 720px) { .section { padding: 64px 0; } }

  /* Eyebrow */
  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: "";
    width: 22px; height: 1.5px; background: var(--orange);
  }

  /* Section heads */
  .section-head h2 {
    font-size: clamp(32px, 4.2vw, 48px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin: 14px 0 14px;
    text-wrap: balance;
  }
  .section-head p {
    color: var(--muted);
    font-size: 17px;
    line-height: 1.55;
    max-width: 640px;
    margin: 0;
  }
  .section-head.on-dark p { color: rgba(255,255,255,0.65); }
  .section-head.on-dark h2 { color: #fff; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(27,43,58,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    transition: background .2s ease;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
  }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 20px; letter-spacing: -0.01em;
    color: #fff;
  }
  .logo .pin {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--orange);
  }
  .logo .finds { color: var(--orange); }
  .logo .tag {
    display: block; font-size: 9px; letter-spacing: 0.22em; font-weight: 600;
    color: rgba(255,255,255,0.5); margin-top: 2px;
  }
  .logo-stack { display: flex; flex-direction: column; line-height: 1.05; }
  .nav-links {
    display: flex; align-items: center; gap: 30px;
  }
  .nav-links a {
    color: rgba(255,255,255,0.78);
    font-size: 14px; font-weight: 500;
    transition: color .15s;
  }
  .nav-links a:hover { color: #fff; }
  .nav-cta { display: flex; align-items: center; gap: 14px; }
  .nav-login {
    color: rgba(255,255,255,0.78);
    font-size: 14px; font-weight: 500;
    transition: color .15s;
  }
  .nav-login:hover { color: #fff; }
  .mobile-toggle {
    display: none;
    color: #fff; font-size: 22px;
    padding: 8px;
  }
  @media (max-width: 900px) {
    .nav-links, .nav-cta .btn, .nav-login { display: none; }
    .mobile-toggle { display: inline-flex; }
  }
  .mobile-menu {
    background: var(--navy);
    border-bottom: 1px solid var(--line);
    padding: 16px 24px 24px;
  }
  .mobile-menu a {
    display: block; padding: 14px 0;
    color: rgba(255,255,255,0.85);
    border-bottom: 1px solid var(--line);
    font-size: 16px;
  }
  .mobile-menu .btn { width: 100%; margin-top: 18px; }

  /* HERO */
  .hero {
    background: var(--navy);
    color: #fff;
    padding: 90px 0 110px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(800px 400px at 85% 10%, rgba(232,133,59,0.10), transparent 60%),
      radial-gradient(600px 380px at 10% 90%, rgba(232,133,59,0.05), transparent 60%);
    pointer-events: none;
  }
  .hero-grid {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 60px;
    align-items: center;
  }
  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 10px;
    background: rgba(232,133,59,0.12);
    color: var(--orange);
    border: 1px solid rgba(232,133,59,0.25);
    border-radius: 100px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.01em;
  }
  .badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 0 4px rgba(232,133,59,0.18);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(232,133,59,0.18); }
    50% { box-shadow: 0 0 0 8px rgba(232,133,59,0.05); }
  }
  .hero h1 {
    font-size: clamp(40px, 6vw, 68px);
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.02;
    margin: 22px 0 22px;
    text-wrap: balance;
  }
  .hero h1 .accent { color: var(--orange); }
  .hero-sub {
    font-size: 18px; line-height: 1.55;
    color: rgba(255,255,255,0.72);
    max-width: 540px;
    margin: 0 0 32px;
  }
  .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
  .hero-trust {
    display: flex; align-items: center; gap: 22px;
    margin-top: 36px;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
  }
  .hero-trust .stars { color: var(--orange); letter-spacing: 2px; }

  /* Hero right - market preview card */
  .hero-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    position: relative;
  }
  .hero-card::after {
    content: ""; position: absolute; inset: -1px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(232,133,59,0.4), transparent 40%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    padding: 1px; pointer-events: none;
  }
  .hero-preview {
    aspect-ratio: 4/5;
    border-radius: 10px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 12px, rgba(255,255,255,0.02) 12px 24px),
      var(--navy-2);
    border: 1px dashed rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.4);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    text-align: center;
    padding: 24px;
    position: relative;
  }
  .hero-preview .live-tag {
    position: absolute; top: 14px; left: 14px;
    background: #c4382e; color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    padding: 5px 9px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hero-preview .live-tag .pulse {
    width: 6px; height: 6px; background: #fff; border-radius: 50%;
    animation: pulse 1.4s infinite;
  }
  .hero-preview .play-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform .2s;
  }
  .hero-preview .play-btn:hover { transform: scale(1.08); }
  .hero-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 6px 4px;
  }
  .hero-meta .title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .hero-meta .sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 3px; }
  .hero-meta .duration { font-size: 12px; color: rgba(255,255,255,0.5); }

  /* Logo bar */
  .logo-bar {
    background: var(--navy);
    border-top: 1px solid var(--line);
    padding: 32px 0;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    text-align: center;
  }
  .logo-bar .row {
    display: flex; align-items: center; justify-content: center;
    gap: 48px; flex-wrap: wrap;
    margin-top: 16px;
    opacity: 0.7;
  }
  .logo-bar .row span { font-weight: 700; letter-spacing: 0.04em; font-size: 16px; color: rgba(255,255,255,0.55); }

  /* VIDEO SECTION */
  .video-section { background: #fff; padding: 80px 0; }
  .video-wrap {
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: var(--navy);
    position: relative;
    box-shadow: 0 30px 80px -30px rgba(27,43,58,0.35);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 14px, transparent 14px 28px),
      linear-gradient(180deg, #1B2B3A, #0f1a25);
    cursor: pointer;
  }
  .video-wrap .video-label {
    position: absolute; top: 24px; left: 24px;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .video-wrap .play-big {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .video-wrap .play-big .circle {
    width: 96px; height: 96px;
    background: var(--orange);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    transition: transform .2s;
    box-shadow: 0 20px 60px -15px rgba(232,133,59,0.6);
  }
  .video-wrap:hover .play-big .circle { transform: scale(1.08); }
  .video-wrap .play-big .ring {
    position: absolute;
    width: 130px; height: 130px;
    border: 2px solid rgba(232,133,59,0.35);
    border-radius: 50%;
    animation: ring 2.4s ease-out infinite;
  }
  @keyframes ring {
    0% { transform: scale(0.7); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .video-caption {
    text-align: center; margin-top: 24px;
    color: var(--muted); font-size: 14px;
  }

  /* HOW IT WORKS */
  .how { background: var(--cream); }
  .how-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    margin-top: 64px;
  }
  @media (max-width: 900px) { .how-grid { grid-template-columns: 1fr; } }
  .step-card {
    background: #fff;
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 36px 32px;
    position: relative;
    transition: all .2s;
  }
  .step-card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px -30px rgba(27,43,58,0.25); }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    background: var(--navy); color: #fff;
    border-radius: 12px;
    font-weight: 800; font-size: 18px;
    margin-bottom: 22px;
  }
  .step-card h3 {
    font-size: 22px; font-weight: 700;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .step-card p { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0 0 18px; }
  .step-card ul { margin: 0; padding: 0; list-style: none; }
  .step-card li {
    font-size: 14px;
    padding: 7px 0;
    color: var(--ink);
    display: flex; gap: 10px;
  }
  .check {
    color: var(--green); flex-shrink: 0;
    margin-top: 2px;
  }
  .arrow-step {
    position: absolute; right: -20px; top: 56px;
    color: var(--orange);
    background: var(--cream);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }
  @media (max-width: 900px) { .arrow-step { display: none; } }

  /* WHY */
  .why { background: var(--navy); color: #fff; }
  .why-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 56px;
  }
  @media (max-width: 1000px) { .why-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .why-grid { grid-template-columns: 1fr; } }
  .why-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px 26px;
    transition: all .2s;
  }
  .why-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(232,133,59,0.4);
    transform: translateY(-4px);
  }
  .why-icon {
    width: 48px; height: 48px;
    background: rgba(232,133,59,0.12);
    border: 1px solid rgba(232,133,59,0.25);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--orange);
    margin-bottom: 20px;
  }
  .why-card h3 {
    font-size: 19px; font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  .why-card p {
    color: rgba(255,255,255,0.6);
    font-size: 14px; line-height: 1.55;
    margin: 0;
  }

  /* STATS */
  .stats {
    background: var(--navy);
    padding: 0 0 96px;
  }
  .stats-inner {
    background: linear-gradient(135deg, rgba(232,133,59,0.10), rgba(255,255,255,0.02));
    border: 1px solid rgba(232,133,59,0.18);
    border-radius: 20px;
    padding: 48px 36px;
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  @media (max-width: 760px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat { text-align: center; }
  .stat .num {
    font-size: clamp(36px, 4.5vw, 54px);
    font-weight: 800;
    color: var(--orange);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat .label {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.65);
    margin-top: 10px;
  }

  /* PRICING */
  .pricing { background: #fff; }
  .pricing-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-top: 56px;
  }
  @media (max-width: 1000px) { .pricing-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .pricing-grid { grid-template-columns: 1fr; } }
  .price-card {
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 32px 26px;
    background: #fff;
    display: flex; flex-direction: column;
    transition: all .2s;
    position: relative;
  }
  .price-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 30px 60px -30px rgba(27,43,58,0.25);
    border-color: rgba(27,43,58,0.2);
  }
  .price-card.featured {
    background: var(--navy); color: #fff;
    border-color: var(--orange);
    box-shadow: 0 30px 60px -20px rgba(27,43,58,0.4);
  }
  .price-card.featured:hover { transform: translateY(-6px); }
  .featured-tag {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--orange);
    color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .price-card .tier {
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .price-card .tagline {
    font-size: 14px; color: var(--muted); margin-bottom: 22px;
    min-height: 22px;
  }
  .price-card.featured .tagline { color: rgba(255,255,255,0.6); }
  .price-card .price {
    font-size: 44px; font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1; margin-bottom: 4px;
  }
  .price-card .price .currency { font-size: 22px; font-weight: 600; vertical-align: top; margin-right: 2px; }
  .price-card .price .unit { font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 4px; }
  .price-card.featured .price .unit { color: rgba(255,255,255,0.5); }
  .price-card .pricesub {
    font-size: 13px; color: var(--muted);
    margin-bottom: 22px;
  }
  .price-card.featured .pricesub { color: rgba(255,255,255,0.55); }
  .price-card ul { list-style: none; margin: 0 0 28px; padding: 0; flex: 1; }
  .price-card li {
    display: flex; gap: 10px;
    padding: 8px 0;
    font-size: 14px; line-height: 1.5;
    border-bottom: 1px solid var(--line-dark);
  }
  .price-card.featured li { border-color: var(--line); color: rgba(255,255,255,0.85); }
  .price-card li:last-child { border-bottom: none; }
  .price-card .btn { width: 100%; }
  .price-card .btn-ghost-dark {
    background: var(--navy); color: #fff;
  }
  .price-card .btn-ghost-dark:hover { background: #0f1a25; }

  /* FOUNDER */
  .founder { background: var(--cream); }
  .founder-grid {
    display: grid; grid-template-columns: 0.9fr 1.1fr;
    gap: 64px; align-items: center;
  }
  @media (max-width: 900px) { .founder-grid { grid-template-columns: 1fr; gap: 40px; } }
  .founder-photo {
    aspect-ratio: 4/5;
    border-radius: 16px;
    background:
      repeating-linear-gradient(45deg, rgba(27,43,58,0.06) 0 14px, rgba(27,43,58,0.02) 14px 28px),
      var(--cream-2);
    border: 1px dashed rgba(27,43,58,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-align: center;
    padding: 24px;
    position: relative;
  }
  .founder-photo .tag {
    position: absolute; bottom: -16px; left: 24px;
    background: var(--navy); color: #fff;
    padding: 14px 20px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    text-align: left;
  }
  .founder-photo .tag .name { font-weight: 700; font-size: 15px; }
  .founder-photo .tag .role { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .founder-content blockquote {
    margin: 0 0 24px;
    font-size: 22px; line-height: 1.45;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .founder-content blockquote::before {
    content: "“";
    color: var(--orange);
    font-size: 64px;
    font-weight: 800;
    line-height: 0.5;
    display: block;
    margin-bottom: 16px;
  }
  .founder-content p {
    color: var(--muted);
    font-size: 16px; line-height: 1.65;
    margin: 0 0 16px;
  }
  .founder-meta {
