<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About the Team — FutianFinds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Bio split */
  .bio { background: #fff; padding: 110px 0; }
  .bio-grid {
    display: grid; grid-template-columns: 1fr 1.15fr; gap: 80px;
    align-items: start;
  }
  @media (max-width: 900px) { .bio-grid { grid-template-columns: 1fr; gap: 48px; } .bio { padding: 80px 0; } }
  .bio-photo {
    aspect-ratio: 4/5;
    border-radius: 16px;
    background: var(--navy);
    border: 1px solid rgba(27,43,58,0.12);
    position: relative;
    position: sticky; top: 100px;
  }
  .bio-photo .bio-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0; border-radius: 16px;
    z-index: 1;
  }
  .bio-photo .name-tag {
    position: absolute; bottom: -24px; left: 24px;
    z-index: 2;
    background: var(--navy); color: #fff;
    padding: 18px 22px;
    border-radius: 12px;
    box-shadow: 0 20px 40px -20px rgba(27,43,58,0.4);
  }
  .name-tag .name { font-weight: 700; font-size: 17px; }
  .name-tag .role { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 0.04em; }
  .bio-photo .badge-corner {
    position: absolute; top: 16px; right: 16px;
    z-index: 2;
    background: rgba(232,133,59,0.95); color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .bio-content h2 {
    font-size: clamp(34px, 4.4vw, 50px);
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin: 16px 0 24px;
  }
  .bio-content blockquote {
    margin: 0 0 28px;
    padding: 0;
    font-size: 22px;
    line-height: 1.45;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-wrap: balance;
  }
  .bio-content blockquote::before {
    content: "“";
    color: var(--orange);
    font-size: 64px;
    font-weight: 800;
    line-height: 0.5;
    display: block;
    margin-bottom: 16px;
  }
  .bio-content p {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.7;
    margin: 0 0 18px;
  }
  .bio-content p strong { color: var(--ink); font-weight: 600; }

  /* Timeline */
  .story-timeline {
    background: var(--cream);
  }
  .st-wrap {
    margin-top: 56px;
    position: relative;
  }
  .st-wrap::before {
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, transparent 0%, var(--orange) 6%, var(--orange) 94%, transparent 100%);
    transform: translateX(-1px);
  }
  @media (max-width: 800px) { .st-wrap::before { left: 22px; } }
  .st-item {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 0;
    margin-bottom: 40px;
    position: relative;
  }
  .st-item:last-child { margin-bottom: 0; }
  .st-item .st-dot {
    width: 16px; height: 16px;
    background: var(--orange);
    border: 4px solid var(--cream);
    border-radius: 50%;
    justify-self: center;
    margin-top: 24px;
    position: relative;
    z-index: 1;
  }
  .st-item .st-card {
    background: #fff;
    border: 1px solid var(--line-dark);
    border-radius: 14px;
    padding: 24px 26px;
    transition: all .2s;
  }
  .st-item .st-card:hover { transform: translateY(-3px); border-color: rgba(232,133,59,0.4); box-shadow: 0 20px 40px -20px rgba(27,43,58,0.2); }
  .st-item .st-card .yr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--orange);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .st-item .st-card h3 {
    font-size: 19px; font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
    color: var(--navy);
  }
  .st-item .st-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    margin: 0;
  }
  .st-item .empty { display: block; }
  .st-item.left .st-card { text-align: right; margin-right: 4px; }
  .st-item.right .st-card { margin-left: 4px; }
  @media (max-width: 800px) {
    .st-item { grid-template-columns: 44px 1fr; }
    .st-item .st-dot { margin-top: 22px; }
    .st-item.left .st-card, .st-item.right .st-card { text-align: left; margin: 0; grid-column: 2; }
    .st-item .empty { display: none; }
    .st-item.left { grid-template-areas: "dot card"; }
    .st-item.left > :nth-child(1) { display: none; }
    .st-item.left > :nth-child(3) { grid-column: 2; }
  }

  /* Stats strip */
  .about-stats {
    background: var(--navy);
    color: #fff;
    padding: 80px 0;
  }
  .as-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  @media (max-width: 760px) { .as-grid { grid-template-columns: repeat(2, 1fr); } }
  .as-item { text-align: center; }
  .as-item .num {
    font-size: clamp(40px, 5vw, 62px);
    font-weight: 800;
    color: var(--orange);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .as-item .lbl {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.65);
    margin-top: 12px;
  }

  /* Values */
  .values { background: #fff; }
  .v-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 56px;
  }
  @media (max-width: 900px) { .v-grid { grid-template-columns: 1fr; } }
  .v-card {
    padding: 32px;
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    background: var(--cream);
  }
  .v-card .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--orange); font-weight: 700;
    letter-spacing: 0.1em; margin-bottom: 14px;
  }
  .v-card h3 { font-size: 22px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.01em; color: var(--navy); }
  .v-card p { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0; }

  /* Our process visual */
  .process-vis { background: var(--cream); padding: 110px 0; }
  .pv-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-top: 56px;
  }
  @media (max-width: 900px) { .pv-grid { grid-template-columns: 1fr 1fr; } }
  .pv-card {
    background: #fff;
    border: 1px solid var(--line-dark);
    border-radius: 14px;
    padding: 28px 22px;
    text-align: center;
    transition: all .2s;
  }
  .pv-card:hover { transform: translateY(-4px); border-color: rgba(232,133,59,0.4); }
  .pv-card .ic {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: rgba(232,133,59,0.10);
    color: var(--orange);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .pv-card h4 { font-size: 17px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
  .pv-card p { color: var(--muted); font-size: 13px; line-height: 1.55; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="about.jsx"></script>
</body>
</html>
