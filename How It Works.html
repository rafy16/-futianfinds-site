<title>How It Works — FutianFinds</title>

<style>
  /* Stepper / vertical timeline */
  .timeline { background: #fff; }
  .timeline-wrap {
    position: relative;
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  .timeline-step {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 32px;
    position: relative;
    padding-bottom: 56px;
  }
  .timeline-step:last-child { padding-bottom: 0; }
  .timeline-step::before {
    content: "";
    position: absolute;
    left: 36px;
    top: 80px;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--orange), rgba(232,133,59,0.15));
  }
  .timeline-step:last-child::before { display: none; }
  .ts-num {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800;
    position: relative; z-index: 1;
    border: 4px solid #fff;
    box-shadow: 0 0 0 2px var(--orange);
  }
  .timeline-step.active .ts-num { background: var(--orange); box-shadow: 0 0 0 2px var(--navy); }
  .ts-body {
    background: var(--cream);
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 32px 36px;
    margin-top: 4px;
    transition: all .2s;
  }
  .ts-body:hover { border-color: rgba(232,133,59,0.4); transform: translateX(4px); }
  .ts-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .ts-header h3 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.01em; color: var(--navy); }
  .ts-duration {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--orange);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: rgba(232,133,59,0.10);
    border-radius: 100px;
  }
  .ts-body p.lead { color: var(--ink); font-size: 16px; line-height: 1.6; margin: 0 0 22px; }
  .ts-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--line-dark);
  }
  @media (max-width: 720px) { .ts-actions { grid-template-columns: 1fr; gap: 18px; } }
  .ts-actions .col h4 {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin: 0 0 10px;
  }
  .ts-actions ul { list-style: none; padding: 0; margin: 0; }
  .ts-actions li {
    font-size: 14px; line-height: 1.5;
    padding: 5px 0;
    display: flex; gap: 10px;
  }
  @media (max-width: 720px) {
    .timeline-step { grid-template-columns: 56px 1fr; gap: 20px; }
    .timeline-step::before { left: 25px; top: 60px; }
    .ts-num { width: 52px; height: 52px; font-size: 18px; }
    .ts-body { padding: 24px 22px; }
    .ts-header h3 { font-size: 20px; }
  }

  /* What to expect */
  .expect { background: var(--cream); }
  .expect-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 48px;
  }
  @media (max-width: 800px) { .expect-grid { grid-template-columns: 1fr; } }
  .expect-item {
    background: #fff;
    border: 1px solid var(--line-dark);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .expect-item.open { border-color: rgba(232,133,59,0.4); }
  .expect-q {
    width: 100%;
    padding: 22px 26px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    text-align: left;
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    transition: background .15s;
  }
  .expect-q:hover { background: rgba(232,133,59,0.04); }
  .expect-q .toggle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .2s;
  }
  .expect-item.open .toggle { background: var(--orange); color: #fff; transform: rotate(45deg); }
  .expect-a {
    padding: 0 26px 22px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }

  /* Process visualization */
  .process-viz {
    background: var(--navy);
    color: #fff;
    padding: 80px 0;
  }
  .viz-cards {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 56px;
  }
  @media (max-width: 900px) { .viz-cards { grid-template-columns: 1fr; } }
  .viz-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 30px 26px;
  }
  .viz-card .day { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--orange); letter-spacing: 0.1em; margin-bottom: 14px; text-transform: uppercase; }
  .viz-card h3 { font-size: 19px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
  .viz-card p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.55; margin: 0; }

  /* Inside Futian Market */
  .inside-market { background: #fff; padding: 96px 0; }
  .district-map {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 16px; margin-top: 52px;
  }
  @media (max-width: 900px) { .district-map { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .district-map { grid-template-columns: 1fr; } }
  .district-card {
    background: var(--cream);
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 24px 20px;
    transition: transform .2s, box-shadow .2s, border-color .2s;
  }
  .district-card:hover {
    transform: translateY(-4px);
    border-color: rgba(232,133,59,0.5);
    box-shadow: 0 26px 50px -30px rgba(27,43,58,0.35);
  }
  .dc-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .dc-num {
    width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 11px;
    background: var(--navy); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800;
  }
  .district-card:hover .dc-num { background: var(--orange); }
  .dc-label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); }
  .dc-cats { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  .dc-cats li {
    font-size: 14px; color: var(--ink); line-height: 1.35;
    padding-left: 16px; position: relative;
  }
  .dc-cats li::before {
    content: ""; position: absolute; left: 0; top: 8px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
  }
  .map-note {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 40px auto 0; max-width: 640px;
    text-align: center;
    font-size: 16px; color: var(--ink); line-height: 1.5;
  }
  .map-note svg { color: var(--orange); flex-shrink: 0; }
  .map-note strong { color: var(--navy); }
</style>
