<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Services & Packages — FutianFinds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Pricing grid */
  .pricing-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-top: 32px;
  }
  @media (max-width: 1000px) { .pricing-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .pricing-grid { grid-template-columns: 1fr; } }
  .price-card {
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 32px 26px;
    background: #fff;
    display: flex; flex-direction: column;
    transition: all .2s;
    position: relative;
  }
  .price-card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px -30px rgba(27,43,58,0.25); border-color: rgba(27,43,58,0.2); }
  .price-card.featured { background: var(--navy); color: #fff; border-color: var(--orange); box-shadow: 0 30px 60px -20px rgba(27,43,58,0.4); }
  .price-card.featured:hover { transform: translateY(-6px); }
  .featured-tag {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--orange); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 5px 12px; border-radius: 4px; text-transform: uppercase;
  }
  .price-card .tier { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
  .price-card .tagline { font-size: 14px; color: var(--muted); margin-bottom: 22px; min-height: 22px; }
  .price-card.featured .tagline { color: rgba(255,255,255,0.6); }
  .price-card .price { font-size: 44px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
  .price-card .price .currency { font-size: 22px; font-weight: 600; vertical-align: top; margin-right: 2px; }
  .price-card .price .unit { font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 4px; }
  .price-card.featured .price .unit { color: rgba(255,255,255,0.5); }
  .price-card .pricesub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .price-card.featured .pricesub { color: rgba(255,255,255,0.55); }
  .price-card ul { list-style: none; margin: 0 0 28px; padding: 0; flex: 1; }
  .price-card li { display: flex; gap: 10px; padding: 8px 0; font-size: 14px; line-height: 1.5; border-bottom: 1px solid var(--line-dark); }
  .price-card.featured li { border-color: var(--line); color: rgba(255,255,255,0.85); }
  .price-card li:last-child { border-bottom: none; }

  /* Pricing models */
  .pricing-section { background: var(--cream); }
  .models-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
  @media (max-width: 900px) { .models-grid { grid-template-columns: 1fr; } }
  .model-card {
    background: #fff;
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 32px 28px;
    transition: all .2s;
  }
  .model-card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px -30px rgba(27,43,58,0.25); }
  .model-card .badge-sm {
    display: inline-block;
    padding: 4px 10px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    background: rgba(232,133,59,0.10);
    color: var(--orange);
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .model-card h3 { font-size: 22px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
  .model-card .rate { font-size: 15px; color: var(--navy); font-weight: 600; margin-bottom: 14px; }
  .model-card p { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
  .model-card .best { font-size: 13px; color: var(--ink); padding: 12px 14px; background: var(--cream); border-radius: 8px; }
  .model-card .best strong { color: var(--navy); }

  /* Add-ons table */
  .addons { background: #fff; }
  .addons-table {
    margin-top: 56px;
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    overflow: hidden;
  }
  .addons-row {
    display: grid; grid-template-columns: 1.4fr 2fr 0.8fr 0.6fr;
    align-items: center;
    padding: 22px 28px;
    border-bottom: 1px solid var(--line-dark);
    gap: 24px;
    transition: background .15s;
  }
  .addons-row:last-child { border-bottom: none; }
  .addons-row:hover { background: var(--cream); }
  .addons-row.head {
    background: var(--navy); color: #fff;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 18px 28px;
  }
  .addons-row.head:hover { background: var(--navy); }
  .addons-row .name { font-weight: 600; font-size: 16px; color: var(--navy); display: flex; align-items: center; gap: 12px; }
  .addons-row .name .ic { color: var(--orange); }
  .addons-row .desc { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .addons-row .price-col { font-size: 18px; font-weight: 700; color: var(--navy); }
  .addons-row .add-btn {
    color: var(--orange); font-weight: 600; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .addons-row .add-btn:hover { color: var(--orange-hover); }
  @media (max-width: 760px) {
    .addons-row { grid-template-columns: 1fr; gap: 8px; padding: 20px; }
    .addons-row.head { display: none; }
    .addons-row .desc { font-size: 13px; }
    .addons-row .price-col { font-size: 16px; }
  }

  /* Compare table */
  .compare-section { background: var(--cream); }
  .compare-table {
    margin-top: 48px;
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    overflow: hidden;
    background: #fff;
  }
  .compare-row {
    display: grid; grid-template-columns: 1.4fr repeat(4, 1fr);
    border-bottom: 1px solid var(--line-dark);
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row .cell { padding: 16px 18px; font-size: 14px; }
  .compare-row.head .cell { background: var(--navy); color: #fff; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
  .compare-row.head .cell:first-child { text-align: left; }
  .compare-row .cell.label { font-weight: 600; color: var(--ink); }
  .compare-row .cell:not(.label):not(:first-child) { text-align: center; color: var(--muted); }
  .compare-row.featured-col .cell:nth-child(4) { background: rgba(232,133,59,0.05); }
  .compare-row.head .cell:nth-child(4) { background: var(--orange); }
  .compare-row .yes { color: var(--green); display: inline-flex; }
  .compare-row .no { color: rgba(0,0,0,0.18); font-weight: 700; }
  @media (max-width: 760px) {
    .compare-table { overflow-x: auto; }
    .compare-row { grid-template-columns: 1.2fr repeat(4, 0.9fr); min-width: 720px; }
  }

  /* FAQ teaser */
  .faq-teaser { background: var(--navy); color: #fff; padding: 80px 0; text-align: center; }
  .faq-teaser h2 { font-size: clamp(28px, 3.6vw, 38px); font-weight: 800; margin: 0 0 14px; letter-spacing: -0.02em; }
  .faq-teaser p { color: rgba(255,255,255,0.65); font-size: 16px; margin: 0 auto 28px; max-width: 540px; }

  /* Package card extras (v3) */
  .price-card .price .unit { white-space: nowrap; }
  .price-card .price-alt { font-size: 13px; font-weight: 600; color: var(--orange); margin: 0 0 10px; }
  .price-card ul { margin: 0 0 18px; }
  .price-card .not-incl { font-size: 12.5px; line-height: 1.5; color: var(--muted); margin: 0 0 16px; }
  .price-card.featured .not-incl { color: rgba(255,255,255,0.55); }
  .price-card .comm-hint {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 12.5px; line-height: 1.5; color: var(--navy);
    background: rgba(232,133,59,0.08); border: 1px solid rgba(232,133,59,0.2);
    border-radius: 8px; padding: 10px 12px; margin: 0 0 16px;
  }
  .price-card .comm-hint svg { color: var(--orange); flex-shrink: 0; margin-top: 1px; }
  .price-card.featured .comm-hint { background: rgba(232,133,59,0.16); border-color: rgba(232,133,59,0.4); color: #fff; }
  .price-card.featured .comm-hint svg { color: var(--orange); }
  .alt-links { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .alt-links a, .alt-links button {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; font-family: inherit; cursor: pointer;
    font-size: 13.5px; font-weight: 700; color: var(--navy);
    padding: 11px 14px; border-radius: 10px;
    background: rgba(20,36,55,0.04);
    border: 1.5px solid rgba(20,36,55,0.18);
    transition: background .15s, border-color .15s, color .15s;
  }
  .alt-links a:hover, .alt-links button:hover { background: rgba(232,133,59,0.1); border-color: var(--orange); color: var(--orange); }
  .price-card.featured .alt-links a, .price-card.featured .alt-links button { color: #fff; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.35); }
  .price-card.featured .alt-links a:hover, .price-card.featured .alt-links button:hover { background: rgba(255,255,255,0.16); border-color: #fff; color: #fff; }
  .price-card .policy-note {
    font-size: 11.5px; line-height: 1.55; color: var(--muted);
    margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line-dark);
  }
  .price-card.featured .policy-note { color: rgba(255,255,255,0.5); border-color: var(--line); }

  /* Currency note */
  .currency-note {
    display: flex; gap: 12px; align-items: center; justify-content: center;
    max-width: 780px; margin: 44px auto 0;
    padding: 16px 24px;
    background: var(--cream); border: 1px solid var(--line-dark);
    border-radius: 12px;
    font-size: 14px; line-height: 1.55; color: var(--ink); text-align: left;
  }
  .currency-note svg { color: var(--orange); flex-shrink: 0; }
  .currency-note strong { color: var(--navy); }
  @media (max-width: 560px) { .currency-note { flex-direction: column; text-align: center; } }

  /* Commission tables */
  .commission { background: var(--cream); }
  .comm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 52px; }
  @media (max-width: 760px) { .comm-grid { grid-template-columns: 1fr; } }
  .comm-card { background: #fff; border: 1px solid var(--line-dark); border-radius: 16px; overflow: hidden; transition: all .2s; }
  .comm-card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px -30px rgba(27,43,58,0.25); }
  .comm-head { padding: 24px 28px; border-bottom: 1px solid var(--line-dark); background: var(--navy); }
  .comm-pkg { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); }
  .comm-note { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .comm-table { padding: 8px 28px 22px; }
  .comm-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--line-dark); font-size: 15px; color: var(--ink); }
  .comm-row:last-child { border-bottom: none; }
  .comm-row-head { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .comm-row .rate { font-size: 22px; font-weight: 800; color: var(--navy); letter-spacing: -0.01em; }

  /* Policies */
  .policies { background: #fff; }
  .policy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 52px; }
  @media (max-width: 760px) { .policy-grid { grid-template-columns: 1fr; } }
  .policy-card { background: var(--cream); border: 1px solid var(--line-dark); border-radius: 18px; padding: 38px 34px; }
  .policy-ic { width: 52px; height: 52px; border-radius: 14px; background: #fff; border: 1px solid var(--line-dark); display: flex; align-items: center; justify-content: center; color: var(--orange); margin-bottom: 22px; }
  .policy-card h3 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 16px; color: var(--navy); }
  .policy-card p { font-size: 15px; line-height: 1.65; color: var(--ink); margin: 0 0 14px; }
  .policy-card p strong { color: var(--navy); }
  .policy-card .policy-foot { font-size: 13.5px; color: var(--muted); margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line-dark); margin-bottom: 0; }

  /* Video proof */
  .video-proof { background: var(--navy); }
  .proof-grid { grid-template-columns: repeat(3, 1fr); max-width: 760px; margin-left: auto; margin-right: auto; }
  @media (max-width: 560px) { .proof-grid { grid-template-columns: 1fr; max-width: 300px; } }
</style>
